name: "Clinical Trials"
version: "1.0.0"
description: |
  Domain for extracting structured knowledge graphs from ClinicalTrials.gov
  protocol documents, IRB submissions, clinical study reports, and trial
  publications. Covers trial design, interventions, conditions, sponsors,
  enrollment populations, outcomes, and biomarkers. Optimized for post-build
  enrichment against the ClinicalTrials.gov v2 and PubChem PUG REST APIs.

system_context: |
  You are analyzing clinical trial documents to build a knowledge graph of
  trials, interventions, conditions, sponsors, investigators, outcomes,
  biomarkers, cohorts, populations, trial phases, and sites.

  NOMENCLATURE STANDARDS:
  - Trials: MUST use the NCT identifier (e.g. "NCT04303780") as the canonical
    name whenever the document cites one. Record any study acronym
    ("CodeBreaK 200") as an alias in attributes.trial_acronym.
  - Compounds: prefer INN (e.g. "sotorasib" not "AMG 510"); record codes as aliases.
  - Conditions: prefer MeSH terms.
  - Interventions: distinguish between COMPOUND (small molecule or biologic)
    and INTERVENTION (procedures, device use, lifestyle). Drug arms are
    extracted as BOTH a Compound entity and an Intervention entity linked by
    the `tests` relation.

  CONFIDENCE CALIBRATION:
  - 0.9-1.0: Explicitly stated with a clear citation.
  - 0.7-0.89: Strongly supported by context.
  - 0.5-0.69: Inferred from indirect evidence.
  - below 0.5: Speculative; flag for review.

fallback_relation: ASSOCIATED_WITH

entity_types:
  Trial:
    description: "A clinical trial identified by an NCT registry ID or study acronym. Use the NCT ID as the canonical name."
  Intervention:
    description: "A procedure, behavioral intervention, device use, or non-drug therapy being studied."
  Condition:
    description: "The disease, disorder, or indication being studied (e.g. 'Non-Small Cell Lung Cancer')."
  Sponsor:
    description: "Organization funding or running the trial — pharmaceutical companies, academic centers, government agencies."
  Investigator:
    description: "Principal investigator or key study personnel named in the protocol."
  Outcome:
    description: "Primary, secondary, or exploratory outcome measure (e.g. 'overall survival', 'progression-free survival')."
  Compound:
    description: "Small molecule, biologic, or drug candidate under investigation. Enriched via PubChem during --enrich."
  Biomarker:
    description: "Measurable indicator used for patient selection, stratification, or response assessment."
  Cohort:
    description: "A specific arm or group within the trial (e.g. 'Arm A: sotorasib 960 mg QD')."
  Population:
    description: "The inclusion/exclusion-defined patient population for the trial."
  TrialPhase:
    description: "The regulatory phase designation — Phase 1, Phase 2, Phase 2/3, Phase 3, Phase 4, or Observational."
  Site:
    description: "A clinical study site — specific hospital, clinic, or country listed as a location."

relation_types:
  tests:
    description: "A Trial tests a Compound or Intervention."
    source_types: [Trial]
    target_types: [Compound, Intervention]
  treats:
    description: "A Compound or Intervention treats a Condition."
    source_types: [Compound, Intervention]
    target_types: [Condition]
  sponsored_by:
    description: "A Trial is sponsored by a Sponsor."
    source_types: [Trial]
    target_types: [Sponsor]
  has_outcome:
    description: "A Trial has a specified Outcome (endpoint)."
    source_types: [Trial]
    target_types: [Outcome]
  uses_biomarker:
    description: "A Trial uses a Biomarker for patient selection, stratification, or response assessment."
    source_types: [Trial]
    target_types: [Biomarker]
  enrolls:
    description: "A Trial enrolls a specific Population or Cohort."
    source_types: [Trial]
    target_types: [Population, Cohort]
  investigates:
    description: "A Trial investigates a Condition."
    source_types: [Trial]
    target_types: [Condition]
  targets:
    description: "A Compound targets a Biomarker (e.g. sotorasib targets KRAS G12C)."
    source_types: [Compound]
    target_types: [Biomarker]
  is_phase:
    description: "A Trial is of a given TrialPhase."
    source_types: [Trial]
    target_types: [TrialPhase]
  co_intervention:
    description: "Two Interventions or Compounds are co-administered in the same Cohort."
    source_types: [Compound, Intervention]
    target_types: [Compound, Intervention]
    symmetric: true
